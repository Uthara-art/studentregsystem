<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <h2>Register as Student</h2>

    <form th:action="@{/student/register}" th:object="${student}" method="post">
        <label>Name:</label>
        <input type="text" th:field="*{name}" required><br><br>

        <label>Email:</label>
        <input type="email" th:field="*{email}" required><br><br>

        <label>Password:</label>
        <input type="password" th:field="*{password}" required><br><br>

        <button type="submit">Register</button>
    </form>

    <p th:text="${error}" style="color:red;"></p>
    <p th:text="${success}" style="color:green;"></p>

    <p>Already have an account? <a th:href="@{/student/login}">Login here</a></p>
</body>
</html>
