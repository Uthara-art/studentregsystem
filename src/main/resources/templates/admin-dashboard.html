<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard - StudentReg</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}" href="/css/dashboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h2 class="brand">StudentReg — Admin</h2>
      <nav>
        <a href="/" th:href="@{/}">Home</a>
        <a href="/admin/dashboard" th:href="@{/admin/dashboard}">Dashboard</a>
        <a href="/admin/courses" th:href="@{/admin/courses}">Courses</a>
        <a href="/admin/students" th:href="@{/admin/students}">Students</a>
        <a href="/admin/courses">Manage Courses</a>
        <a href="/admin/students">View Students</a>


        <a href="/logout" th:href="@{/logout}">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Dashboard</h1>
    <p class="subtitle">Overview of the system</p>

    <section class="cards">
      <div class="card">
        <div class="big-number" th:text="${totalStudents}">0</div>
        <div class="label">Total Students</div>
      </div>

      <div class="card">
        <div class="big-number" th:text="${totalCourses}">0</div>
        <div class="label">Total Courses</div>
      </div>

      <div class="card">
        <div class="big-number" th:text="${totalRegistrations}">0</div>
        <div class="label">Total Registrations</div>
      </div>

      <div class="card">
        <div class="big-number" th:text="${availableSeats}">0</div>
        <div class="label">Available Seats</div>
      </div>
    </section>

    <section class="quick-actions">
      <h2>Quick actions</h2>
      <div class="actions-row">
        <a class="action-btn" th:href="@{/admin/courses}">Manage Courses</a>
        <a class="action-btn" th:href="@{/admin/students}">View Students</a>
        <a class="action-btn" th:href="@{/admin/registrations}">View Registrations</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">StudentReg — Demo app</div>
  </footer>
</body>
</html>
