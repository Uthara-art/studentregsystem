<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; font-family: Arial, sans-serif; }
        .container { max-width: 1000px; margin: 30px auto; }
        .card-course { transition: box-shadow .2s; }
        .card-course:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Course Catalog</h3>
        <a th:href="@{'/student/dashboard?studentId=' + ${student.id}}" class="btn btn-secondary">← Back to Dashboard</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-3">
        <div class="col-12" th:if="${#lists.isEmpty(courses)}">
            <p class="text-muted">No courses available.</p>
        </div>

        <div class="col-md-6 col-lg-4" th:each="course : ${courses}">
            <div class="card card-course p-3">
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.name}">Course Name</h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${course.code}">CODE101</h6>
                    <p class="card-text" th:text="${course.description}">Short description...</p>

                    <div class="d-flex justify-content-between align-items-center">
                        <small th:text="'Seats left: ' + ${course.availableSeats}">Seats left: 10</small>

                        <!-- If already registered, show Disabled button -->
                        <div th:if="${registeredCourseIds.contains(course.id)}">
                            <button class="btn btn-outline-success btn-sm" disabled>Registered</button>
                        </div>

                        <!-- If not registered and seats available -->
                        <div th:if="${!registeredCourseIds.contains(course.id)}">
                            <form th:action="@{/student/courses/register}" method="post" class="d-inline">
                                <input type="hidden" name="studentId" th:value="${student.id}" />
                                <input type="hidden" name="courseId" th:value="${course.id}" />
                                <button type="submit"
                                        class="btn btn-primary btn-sm"
                                        th:disabled="${course.availableSeats <= 0}">
                                    Register
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
