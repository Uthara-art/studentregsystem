<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Courses - Admin | StudentReg</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body {
      background-color: #f8f9fa;
    }
    header {
      background-color: #0d6efd;
      color: white;
      padding: 15px 0;
    }
    header h2 {
      margin: 0;
    }
    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .btn {
      border-radius: 8px;
    }
    footer {
      margin-top: 50px;
      background-color: #0d6efd;
      color: white;
      text-align: center;
      padding: 10px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="container d-flex justify-content-between align-items-center">
    <h2>StudentReg — Admin</h2>
    <nav>
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/admin/courses}">Courses</a>
      <a th:href="@{/admin/students}">Students</a>
      <a th:href="@{/admin/registrations}">Registrations</a>
      <a th:href="@{/logout}">Logout</a>
    </nav>
  </div>
</header>

<div class="container my-5">
  <h2 class="text-center text-primary mb-4">Manage Courses</h2>

  <!-- Error or Success Messages -->
  <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <!-- Add Course Section -->
  <div class="card p-4 mb-5">
    <h4 class="mb-3 text-secondary">Add New Course</h4>
    <form th:action="@{/admin/courses/add}" th:object="${course}" method="post">
      <div class="row mb-3">
        <div class="col-md-3">
          <label class="form-label">Course Code</label>
          <input type="text" th:field="*{code}" class="form-control" placeholder="e.g. CS101" required />
        </div>
        <div class="col-md-3">
          <label class="form-label">Course Name</label>
          <input type="text" th:field="*{name}" class="form-control" placeholder="Course name" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Description</label>
          <input type="text" th:field="*{description}" class="form-control" placeholder="Brief description" />
        </div>
        <div class="col-md-2">
          <label class="form-label">Capacity</label>
          <input type="number" th:field="*{capacity}" class="form-control" min="1" required />
        </div>
      </div>
      <div class="text-end">
        <button type="submit" class="btn btn-success px-4">➕ Add Course</button>
      </div>
    </form>
  </div>

  <!-- Course List Section -->
  <div class="card p-4">
    <h4 class="mb-3 text-secondary">Existing Courses</h4>
    <div th:if="${#lists.isEmpty(courses)}" class="alert alert-info">
      No courses available. Add a new course above.
    </div>
    <table class="table table-striped align-middle" th:if="${!#lists.isEmpty(courses)}">
      <thead class="table-primary">
        <tr>
          <th>Code</th>
          <th>Name</th>
          <th>Description</th>
          <th>Capacity</th>
          <th>Enrolled</th>
          <th>Available</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="course : ${courses}">
          <td th:text="${course.code}"></td>
          <td th:text="${course.name}"></td>
          <td th:text="${course.description}"></td>
          <td th:text="${course.capacity}"></td>
          <td th:text="${course.enrolled}"></td>
          <td th:text="${course.capacity - course.enrolled}"></td>
          <td class="text-center">
            <form th:action="@{'/admin/courses/delete/' + ${course.id}}" method="post" class="d-inline">
              <button type="submit" class="btn btn-danger btn-sm">🗑 Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  <div>© 2025 StudentReg — Admin Panel</div>
</footer>

</body>
</html>
