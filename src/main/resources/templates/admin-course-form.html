<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Form</title>
</head>
<body>
<h2 th:text="${course.id != null} ? 'Edit Course' : 'Add New Course'"></h2>
<form th:action="@{/admin/courses/save}" th:object="${course}" method="post">
    <input type="hidden" th:field="*{id}" />
    <label>Code:</label>
    <input type="text" th:field="*{code}" required /><br><br>

    <label>Title:</label>
    <input type="text" th:field="*{title}" required /><br><br>

    <label>Description:</label>
    <textarea th:field="*{description}" rows="4" cols="40"></textarea><br><br>

    <label>Capacity:</label>
    <input type="number" th:field="*{capacity}" required /><br><br>

    <button type="submit">Save</button>
</form>
<br>
<a href="/admin/courses">Back to Course List</a>
</body>
</html>
