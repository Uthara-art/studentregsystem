<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Registration</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .signup-container {
            background: #fff;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        p {
            text-align: center;
            margin-top: 10px;
        }
        .error {
            color: red;
            text-align: center;
        }
        .success {
            color: green;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>Student Registration</h2>

    <form th:action="@{/student/signup}" method="post" th:object="${student}">
        <label for="name">Name</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Enter full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" placeholder="Enter email" required>

        <label for="password">Password</label>
        <input type="password" id="password" th:field="*{password}" placeholder="Enter password" required>

        <!-- ✅ Added Branch -->
        <label for="branch">Branch</label>
        <input type="text" id="branch" th:field="*{branch}" placeholder="e.g., CSE, ECE, ME" required>

        <!-- ✅ Added Semester -->
        <label for="semester">Semester</label>
        <select id="semester" th:field="*{semester}" required>
            <option value="">Select Semester</option>
            <option th:value="1">1</option>
            <option th:value="2">2</option>
            <option th:value="3">3</option>
            <option th:value="4">4</option>
            <option th:value="5">5</option>
            <option th:value="6">6</option>
            <option th:value="7">7</option>
            <option th:value="8">8</option>
        </select>

        <button type="submit">Register</button>
    </form>

    <p class="error" th:text="${error}"></p>
    <p class="success" th:text="${success}"></p>

    <p>Already have an account?
        <a th:href="@{/student/login}">Login here</a>
    </p>
</div>

</body>
</html>
